<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Vacaciones 2026 - Sevilla (Sincronizado)</title>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; -webkit-print-color-adjust: exact; }
            .print-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
            .print-full-width { width: 100% !important; max-height: none !important; overflow: visible !important; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Inicialización segura. Detecta si hay config de Firebase
        let firebaseApp, db, auth, appId;
        
        try {
            const configRaw = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (configRaw) {
                const firebaseConfig = JSON.parse(configRaw);
                firebaseApp = initializeApp(firebaseConfig);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'vacaciones-2026-v1';
                window.fbServices = { auth, db, appId, setDoc, doc, onSnapshot, collection, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
            } else {
                console.warn("Configuración de Firebase no detectada. Funcionando en modo local.");
                window.fbServices = null;
            }
        } catch (e) {
            console.error("Fallo crítico en inicialización de base de datos:", e);
            window.fbServices = null;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONOS ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                Calendar: <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />,
                Users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm13 14v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />,
                Save: <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8" />,
                Plus: <path d="M12 5v14M5 12h14" />,
                Trash2: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1-2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z" />,
                Info: (<><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></>),
                Bell: <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />,
                ChevronUp: <path d="m18 15-6-6-6 6" />,
                ChevronDown: <path d="m6 9 6 6 6-6" />,
                Check: <path d="M20 6 9 17l-5-5" />,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                Cloud: <path d="M17.5 19a5.5 5.5 0 0 0 0-11H16.5a8 8 0 1 0-14.5 4.5" />,
                CloudOff: <path d="m2 2 20 20M15.53 10.53A5.5 5.5 0 0 0 17.5 19h-7.5m-5-1a8 8 0 0 1 1-15.5M8.5 8.5 12 12" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const INITIAL_HOLIDAYS = [
            { date: '2026-01-01', name: 'Año Nuevo', type: 'nacional' },
            { date: '2026-01-06', name: 'Epifanía del Señor', type: 'nacional' },
            { date: '2026-02-28', name: 'Día de Andalucía', type: 'regional' },
            { date: '2026-04-02', name: 'Jueves Santo', type: 'nacional' },
            { date: '2026-04-03', name: 'Viernes Santo', type: 'nacional' },
            { date: '2026-05-01', name: 'Fiesta del Trabajo', type: 'nacional' },
            { date: '2026-05-30', name: 'San Fernando', type: 'local' },
            { date: '2026-06-04', name: 'Corpus Christi', type: 'local' },
            { date: '2026-08-15', name: 'Asunción de la Virgen', type: 'nacional' },
            { date: '2026-10-12', name: 'Fiesta Nacional de España', type: 'nacional' },
            { date: '2026-11-02', name: 'Traslado Todos los Santos', type: 'nacional' },
            { date: '2026-12-07', name: 'Traslado Día Constitución', type: 'nacional' },
            { date: '2026-12-08', name: 'Inmaculada Concepción', type: 'nacional' },
            { date: '2026-12-25', name: 'Navidad', type: 'nacional' },
        ];

        const ABSENCE_TYPES = {
            VACATION: { id: 'V', label: 'Vacaciones', color: 'bg-blue-500', text: 'text-white' },
            FREE_DAY: { id: 'LD', label: 'Libre Disposición', color: 'bg-green-500', text: 'text-white' },
            HALF_DAY: { id: '1/2', label: 'Media Jornada', color: 'bg-yellow-400', text: 'text-black' },
            INTENSIVE: { id: 'I', label: 'Intensiva', color: 'bg-purple-400', text: 'text-white' },
            CLOSED: { id: 'C', label: 'Cierre Empresa', color: 'bg-red-600', text: 'text-white' },
        };

        const MONTHS = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const DAYS_SHORT = ["L", "M", "X", "J", "V", "S", "D"];

        function App() {
            const [year, setYear] = useState(2026);
            const [applicants, setApplicants] = useState([]);
            const [holidays, setHolidays] = useState(INITIAL_HOLIDAYS);
            const [selectedApplicantId, setSelectedApplicantId] = useState(null);
            const [selectedType, setSelectedType] = useState('VACATION');
            const [notes, setNotes] = useState("");
            const [showAddForm, setShowAddForm] = useState(false);
            const [newNameInput, setNewNameInput] = useState("");
            const [notification, setNotification] = useState(null);
            const [user, setUser] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            const [hasLoadedCloud, setHasLoadedCloud] = useState(false);
            const [cloudAvailable, setCloudAvailable] = useState(true);

            const notify = (msg, type = "info") => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const defaultData = () => {
                const names = ["JUAN PÉREZ", "MARÍA GARCÍA", "RICARDO SOTO", "ALMUDENA RUIZ", "CARLOS MARTÍN", "BEATRIZ LUNA", "FRANCISCO JAVIER", "ELENA CANO", "SERGIO MORA", "PATRICIA VEGA", "MIGUEL ÁNGEL", "SARA TORRES", "MANUEL CORTÉS", "RAQUEL PEÑA", "ADRIÁN BLANCO"];
                setApplicants(names.map((name, i) => ({ id: (i + 1).toString(), name, absences: {} })));
                setNotes("NOTAS:\n* Los días libres se pedirán con 15 días de antelación.\n* No podrán coincidir más de 2 personas de vacaciones simultáneamente.");
            };

            // 1. Inicialización de sesión y redundancia
            useEffect(() => {
                const services = window.fbServices;
                if (!services) {
                    setCloudAvailable(false);
                    defaultData();
                    setHasLoadedCloud(true);
                    return;
                }

                const init = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await services.signInWithCustomToken(services.auth, __initial_auth_token);
                        } else {
                            await services.signInAnonymously(services.auth);
                        }
                        services.onAuthStateChanged(services.auth, setUser);
                    } catch (e) {
                        console.error("Error Autenticación:", e);
                        setCloudAvailable(false);
                        setHasLoadedCloud(true);
                    }
                };
                init();

                // Timeout de seguridad: si en 4 seg no carga de la nube, cargamos local
                const timer = setTimeout(() => {
                    if (!hasLoadedCloud) {
                        defaultData();
                        setHasLoadedCloud(true);
                    }
                }, 4000);
                return () => clearTimeout(timer);
            }, []);

            // 2. Escuchar cambios de la nube
            useEffect(() => {
                const services = window.fbServices;
                if (!user || !services) return;

                const stateDoc = services.doc(services.db, 'artifacts', services.appId, 'public', 'data', 'vacations', 'current');
                
                const unsubscribe = services.onSnapshot(stateDoc, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        setApplicants(data.applicants || []);
                        setHolidays(data.holidays || INITIAL_HOLIDAYS);
                        setNotes(data.notes || "");
                    } else {
                        defaultData();
                    }
                    setHasLoadedCloud(true);
                }, (err) => {
                    console.error("Error en escucha de nube:", err);
                    setHasLoadedCloud(true);
                });

                return () => unsubscribe();
            }, [user]);

            const saveData = async () => {
                if (!hasLoadedCloud) return;
                
                const services = window.fbServices;
                if (!services || !user) {
                    // Si estamos en local (GitHub), guardamos en localStorage como respaldo
                    localStorage.setItem('vacaciones_local_backup', JSON.stringify({ applicants, holidays, notes }));
                    notify("GitHub Detectado: Los datos se guardan solo en este navegador. Para nube contacta con soporte.", "warning");
                    return;
                }

                const stateDoc = services.doc(services.db, 'artifacts', services.appId, 'public', 'data', 'vacations', 'current');
                
                try {
                    setIsSyncing(true);
                    await services.setDoc(stateDoc, { 
                        applicants, 
                        holidays, 
                        notes,
                        lastUpdate: new Date().toISOString()
                    });
                    notify("¡Cambios guardados y sincronizados con éxito!", "success");
                } catch (e) {
                    console.error("Fallo al guardar:", e);
                    notify("Error al guardar. Comprueba tu conexión.", "warning");
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleAddApplicant = (e) => {
                e.preventDefault();
                if (newNameInput.trim()) {
                    const newId = Date.now().toString();
                    setApplicants(prev => [...prev, { id: newId, name: newNameInput.trim().toUpperCase(), absences: {} }]);
                    setNewNameInput("");
                    setShowAddForm(false);
                }
            };

            const removeApplicant = (id) => {
                setApplicants(prev => prev.filter(a => a.id !== id));
                if (selectedApplicantId === id) setSelectedApplicantId(null);
            };

            const updateApplicantName = (id, newName) => {
                setApplicants(prev => prev.map(a => a.id === id ? { ...a, name: newName.toUpperCase() } : a));
            };

            const moveApplicant = (index, dir) => {
                const newItems = [...applicants];
                const target = index + dir;
                if (target >= 0 && target < newItems.length) {
                    [newItems[index], newItems[target]] = [newItems[target], newItems[index]];
                    setApplicants(newItems);
                }
            };

            const toggleDay = (dateStr) => {
                if (!selectedApplicantId) {
                    notify("Primero debes seleccionar a un empleado en la tabla inferior", "warning");
                    return;
                }
                setApplicants(prev => prev.map(app => {
                    if (app.id === selectedApplicantId) {
                        const newAbsences = { ...app.absences };
                        newAbsences[dateStr] === selectedType ? delete newAbsences[dateStr] : newAbsences[dateStr] = selectedType;
                        return { ...app, absences: newAbsences };
                    }
                    return app;
                }));
            };

            const calendarData = useMemo(() => {
                const months = [];
                for (let m = 0; m < 12; m++) {
                    const days = [];
                    const firstDay = new Date(year, m, 1);
                    const lastDay = new Date(year, m + 1, 0);
                    let startDay = (firstDay.getDay() + 6) % 7;
                    for (let i = 0; i < startDay; i++) days.push(null);
                    for (let d = 1; d <= lastDay.getDate(); d++) days.push(new Date(year, m, d));
                    months.push({ name: MONTHS[m], days });
                }
                return months;
            }, [year]);

            const calculateTotals = (app) => {
                const totals = { V: 0, LD: 0, HALF: 0, I: 0 };
                Object.values(app.absences).forEach(type => {
                    if (type === 'VACATION') totals.V++;
                    else if (type === 'FREE_DAY') totals.LD++;
                    else if (type === 'HALF_DAY') totals.HALF++;
                    else if (type === 'INTENSIVE') totals.I++;
                });
                return totals;
            };

            if (!hasLoadedCloud) {
                return (
                    <div className="loading-overlay">
                        <div className="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-6 shadow-xl"></div>
                        <h2 className="text-xl font-bold text-slate-700 tracking-tight">Estableciendo conexión segura...</h2>
                        <p className="text-slate-400 mt-2 max-w-xs text-center text-sm">Estamos conectando con la base de datos para sincronizar tus dispositivos. Un momento...</p>
                    </div>
                );
            }

            return (
                <div className="p-4 md:p-6 max-w-[1600px] mx-auto min-h-screen animate-fade-in">
                    {notification && (
                        <div className={`fixed top-4 right-4 z-50 flex items-center gap-3 rounded-xl px-5 py-4 text-sm font-bold text-white shadow-2xl border border-white/20 animate-fade-in ${notification.type === 'success' ? 'bg-emerald-600' : notification.type === 'warning' ? 'bg-orange-500' : 'bg-slate-800'}`}>
                            <Icon name="Bell" size={20} /> {notification.msg}
                        </div>
                    )}

                    <header className="mb-6 flex flex-wrap items-center justify-between gap-4 border-b border-slate-200 bg-white p-5 rounded-2xl shadow-sm no-print">
                        <div className="flex items-center gap-4">
                            <div className="rounded-xl bg-indigo-600 p-3 text-white shadow-lg shadow-indigo-200">
                                <Icon name="Calendar" size={28} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 leading-none tracking-tight uppercase">Vacaciones <span className="text-indigo-600">{year}</span></h1>
                                <div className={`mt-2 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest ${cloudAvailable ? "text-emerald-500" : "text-orange-500"}`}>
                                    <Icon name={cloudAvailable ? "Cloud" : "CloudOff"} size={12} />
                                    {cloudAvailable ? "Base de datos sincronizada" : "Modo Local (GitHub detected)"}
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-wrap items-center gap-3">
                            <button onClick={saveData} disabled={isSyncing} className="flex items-center gap-2 rounded-xl bg-emerald-600 px-6 py-3 text-sm font-black text-white hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100 active:scale-95 disabled:opacity-50">
                                {isSyncing ? "Guardando..." : <><Icon name="Save" size={18} /> GUARDAR CAMBIOS</>}
                            </button>
                            <button onClick={() => window.print()} className="flex items-center gap-2 rounded-xl bg-slate-800 px-5 py-3 text-sm font-black text-white hover:bg-black transition-all shadow-md active:scale-95">
                                <Icon name="Printer" size={18} /> PDF / IMPRIMIR
                            </button>
                            <select value={year} onChange={(e) => setYear(parseInt(e.target.value))} className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-black text-slate-600 outline-none focus:ring-4 focus:ring-indigo-100 cursor-pointer shadow-sm">
                                <option value={2026}>AÑO 2026</option>
                                <option value={2027}>AÑO 2027</option>
                            </select>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 print-grid">
                        {calendarData.map((month, mIdx) => (
                            <div key={mIdx} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col hover:border-indigo-400 hover:shadow-xl hover:shadow-indigo-50 transition-all group">
                                <div className="bg-slate-50 py-2.5 text-center font-black text-slate-600 border-b border-slate-100 uppercase text-xs tracking-[0.2em] group-hover:bg-indigo-600 group-hover:text-white transition-colors">{month.name}</div>
                                <div className="grid grid-cols-7 bg-slate-100 gap-px flex-1">
                                    {DAYS_SHORT.map(d => <div key={d} className="bg-white py-1.5 text-center text-[9px] font-black text-slate-400">{d}</div>)}
                                    {month.days.map((date, dIdx) => {
                                        if (!date) return <div key={dIdx} className="bg-slate-50 h-10" />;
                                        const dateStr = date.toISOString().split('T')[0];
                                        const holiday = holidays.find(h => h.date === dateStr);
                                        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                                        const dayAbsences = applicants.filter(a => a.absences[dateStr]).map(a => ({ name: a.name, type: a.absences[dateStr] }));
                                        
                                        let bg = holiday ? (holiday.type === 'local' ? 'bg-orange-100' : 'bg-red-100') : (isWeekend ? 'bg-slate-50' : 'bg-white');
                                        let text = holiday ? (holiday.type === 'local' ? 'text-orange-700' : 'text-red-700') : (isWeekend ? 'text-slate-400' : 'text-slate-700');

                                        return (
                                            <div key={dateStr} onClick={() => toggleDay(dateStr)} className={`h-11 p-1 relative cursor-pointer hover:bg-indigo-50 border-t border-l border-slate-100 text-center transition-all ${bg}`}>
                                                <span className={`text-xs font-black ${text}`}>{date.getDate()}</span>
                                                <div className="flex flex-wrap justify-center gap-0.5 mt-0.5">
                                                    {dayAbsences.map((abs, i) => <div key={i} className={`w-1.5 h-1.5 rounded-full ${ABSENCE_TYPES[abs.type].color} shadow-sm`} title={abs.name} />)}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8 no-print">
                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <h3 className="text-xs font-black uppercase tracking-widest mb-5 flex items-center gap-2 text-slate-500"><Icon name="Info" size={16} className="text-indigo-500" /> Marcador de día</h3>
                            <div className="grid grid-cols-1 gap-2">
                                {Object.entries(ABSENCE_TYPES).map(([key, value]) => (
                                    <button key={key} onClick={() => setSelectedType(key)} className={`flex items-center justify-between gap-2 px-4 py-3 rounded-xl border-2 text-xs font-black transition-all ${selectedType === key ? 'border-indigo-600 bg-indigo-50 shadow-lg shadow-indigo-100 scale-[1.02]' : 'border-slate-100 bg-white hover:border-slate-200 hover:bg-slate-50'}`}>
                                        <div className="flex items-center gap-3">
                                            <span className={`w-8 h-6 flex items-center justify-center rounded-lg text-[10px] ${value.color} ${value.text} shadow-sm`}>{value.id}</span>
                                            {value.label.toUpperCase()}
                                        </div>
                                        {selectedType === key && <Icon name="Check" size={14} className="text-indigo-600" />}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                            <h3 className="text-xs font-black uppercase tracking-widest mb-5 text-slate-500">Observaciones y Normas</h3>
                            <textarea value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full flex-1 text-xs p-4 bg-slate-50 border-2 border-slate-100 rounded-xl resize-none outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 focus:bg-white transition-all font-medium" placeholder="Escribe aquí las normas internas..." />
                        </div>
                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <h3 className="text-xs font-black uppercase tracking-widest mb-5 text-slate-500">Festivos 2026 (Sevilla)</h3>
                            <div className="max-h-[200px] overflow-y-auto custom-scrollbar text-[11px] space-y-2 pr-2">
                                {holidays.sort((a,b) => a.date.localeCompare(b.date)).map((h, i) => (
                                    <div key={i} className="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                                        <span className="font-black text-indigo-600 bg-white px-2 py-0.5 rounded shadow-sm">{h.date.split('-').reverse().slice(0,2).join('/')}</span> 
                                        <span className="flex-1 px-3 truncate font-bold text-slate-600">{h.name.toUpperCase()}</span>
                                        <span className={`text-[8px] px-2 py-1 rounded-md font-black uppercase shadow-sm ${h.type === 'local' ? 'bg-orange-500 text-white' : 'bg-red-500 text-white'}`}>{h.type}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <section className="mt-8 bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden print-full-width">
                        <div className="bg-slate-900 px-8 py-5 flex justify-between items-center no-print">
                            <h3 className="text-sm font-black uppercase tracking-[0.2em] flex items-center gap-3 text-white"><Icon name="Users" size={20} className="text-indigo-400" /> Registro de Empleados</h3>
                            {showAddForm ? (
                                <form onSubmit={handleAddApplicant} className="flex gap-2 animate-fade-in">
                                    <input autoFocus value={newNameInput} onChange={(e) => setNewNameInput(e.target.value)} className="text-xs px-4 py-2 bg-white rounded-xl outline-none focus:ring-4 focus:ring-indigo-500/50 font-bold" placeholder="NOMBRE COMPLETO..." />
                                    <button type="submit" className="p-2 bg-emerald-500 text-white rounded-xl hover:bg-emerald-600 transition shadow-lg shadow-emerald-500/20"><Icon name="Check" size={18}/></button>
                                    <button type="button" onClick={() => setShowAddForm(false)} className="p-2 bg-red-500 text-white rounded-xl hover:bg-red-600 transition"><Icon name="X" size={18}/></button>
                                </form>
                            ) : (
                                <button onClick={() => setShowAddForm(true)} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-xs font-black flex items-center gap-2 hover:bg-indigo-500 transition shadow-lg shadow-indigo-600/30 active:scale-95"><Icon name="Plus" size={16}/> AÑADIR NUEVO</button>
                            )}
                        </div>
                        <div className="overflow-x-auto max-h-[700px] overflow-y-auto custom-scrollbar">
                            <table className="w-full text-xs text-left border-collapse">
                                <thead className="sticky top-0 bg-slate-100 z-10 border-b-2 border-slate-200">
                                    <tr>
                                        <th className="px-8 py-5 border-r font-black uppercase text-slate-500 tracking-widest bg-slate-50">Nombre Empleado</th>
                                        <th className="px-4 py-5 text-center border-r font-black text-blue-600 bg-blue-50/50">V</th>
                                        <th className="px-4 py-5 text-center border-r font-black text-green-600 bg-green-50/50">LD</th>
                                        <th className="px-4 py-5 text-center border-r font-black text-orange-600 bg-orange-50/50">1/2</th>
                                        <th className="px-4 py-5 text-center border-r font-black text-purple-600 bg-purple-50/50">I</th>
                                        <th className="px-6 py-5 text-center border-r font-black bg-slate-900 text-white">TOTAL</th>
                                        <th className="px-8 py-5 no-print font-black text-slate-400 text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {applicants.map((app, i) => {
                                        const t = calculateTotals(app);
                                        const sum = t.V + t.LD + (t.HALF * 0.5);
                                        const isSel = selectedApplicantId === app.id;
                                        return (
                                            <tr key={app.id} className={`${isSel ? 'bg-indigo-50/80 ring-2 ring-inset ring-indigo-200' : 'hover:bg-slate-50/50'} transition-all`}>
                                                <td className="px-8 py-4 border-r">
                                                    <div className="flex items-center justify-between gap-4">
                                                        <input className="bg-transparent border-none outline-none font-black text-slate-700 w-full focus:text-indigo-600 text-sm uppercase tracking-tight" value={app.name} onChange={(e) => updateApplicantName(app.id, e.target.value)} />
                                                        <button onClick={() => setSelectedApplicantId(isSel ? null : app.id)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase no-print transition-all whitespace-nowrap shadow-sm ${isSel ? 'bg-indigo-600 text-white scale-105' : 'bg-white text-slate-400 border border-slate-200 hover:border-indigo-400 hover:text-indigo-600'}`}>{isSel ? 'EDITANDO DÍAS' : 'SELECCIONAR'}</button>
                                                    </div>
                                                </td>
                                                <td className="text-center border-r font-black text-blue-600 text-sm">{t.V || '-'}</td>
                                                <td className="text-center border-r font-black text-green-600 text-sm">{t.LD || '-'}</td>
                                                <td className="text-center border-r font-black text-orange-600 text-sm">{t.HALF || '-'}</td>
                                                <td className="text-center border-r font-black text-purple-600 text-sm">{t.I || '-'}</td>
                                                <td className="text-center border-r font-black text-slate-900 bg-slate-100 text-base">{sum.toFixed(1)}</td>
                                                <td className="px-8 py-4 no-print">
                                                    <div className="flex justify-center gap-3">
                                                        <button onClick={() => moveApplicant(i, -1)} className="p-2 rounded-lg bg-slate-50 text-slate-400 hover:bg-white hover:text-indigo-600 hover:shadow-md transition-all"><Icon name="ChevronUp" size={20}/></button>
                                                        <button onClick={() => moveApplicant(i, 1)} className="p-2 rounded-lg bg-slate-50 text-slate-400 hover:bg-white hover:text-indigo-600 hover:shadow-md transition-all"><Icon name="ChevronDown" size={20}/></button>
                                                        <button onClick={() => removeApplicant(app.id)} className="p-2 rounded-lg bg-red-50 text-red-300 hover:bg-red-500 hover:text-white hover:shadow-lg hover:shadow-red-200 transition-all"><Icon name="Trash2" size={20}/></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
